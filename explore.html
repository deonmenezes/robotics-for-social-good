<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore — Robotics for Social Good</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/explore.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
</head>
<body>
    <nav class="navbar scrolled" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="logo-icon">⚙️</span>
                <span class="logo-text">Robotics for Social Good</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="explore.html" class="nav-active">Explore</a></li>
                <li><a href="upload.html">Upload</a></li>
                <li><a href="impact.html">Impact</a></li>
                <li><a href="pricing.html">Pricing</a></li>
            </ul>
            <div class="nav-actions">
                <a href="upload.html" class="btn-create" id="createBtn">+ Create</a>
            </div>
        </div>
    </nav>

    <main class="explore-page">
        <!-- Top bar -->
        <div class="explore-topbar">
            <div class="explore-left">
                <h1>Explore</h1>
                <span class="explore-count" id="totalCount">0 datasets</span>
            </div>
            <div class="explore-right">
                <div class="explore-filters" id="filterBar">
                    <button class="pill active" data-filter="all">All</button>
                    <button class="pill" data-filter="waste-segregation">Waste</button>
                    <button class="pill" data-filter="food-outreach">Food</button>
                    <button class="pill" data-filter="elder-support">Elder</button>
                    <button class="pill" data-filter="robotics">Robotics</button>
                </div>
            </div>
        </div>

        <!-- Grid -->
        <div class="thumb-grid" id="thumbGrid"></div>

        <!-- Powered by -->
        <div class="powered-bar">
            <span>Powered by <strong>NomadicML</strong></span>
            <span class="dot"></span>
            <span>Donate data for social good & get paid</span>
            <span class="dot"></span>
            <span>CC-BY-4.0</span>
        </div>
    </main>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="datasetModal">
        <div class="detail-panel" id="detailPanel">
            <button class="detail-close" id="detailClose">&times;</button>
            <div id="detailContent"></div>
        </div>
    </div>

    <script src="js/explore.js"></script>
</body>
</html>
